body::before{content:"";position:fixed;inset:0;pointer-events:none;z-index:9999;opacity:0.012;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3'/%3E%3C/filter%3E%3Crect width='200' height='200' filter='url(%23n)'/%3E%3C/svg%3E")}
</style>

<script>

function gTd(){var d=new Date().getDay();return d===0?6:d-1}
function gWN(){var d=new Date(),s=new Date(d.getFullYear(),0,1);return Math.ceil(((d-s)/864e5+s.getDay()+1)/7)}
function gWI(){return"W"+gWN()+"-"+new Date().getFullYear()}

function Ic(p){
  var paths={
    back:h("path",{d:"M15 18l-6-6 6-6"}),
    x:h("path",{d:"M18 6L6 18M6 6l12 12"}),
    arrow:h("path",{d:"M5 12h14m-4-4l4 4-4 4"}),
    chart:h("path",{d:"M3 3v18h18M7 16l4-4 4 4 5-5"}),
    plus:h("path",{d:"M12 5v14M5 12h14"}),
    minus:h("path",{d:"M5 12h14"}),
    check:h("path",{d:"M20 6L9 17l-5-5"}),
    play:h("path",{d:"M5 3l14 9-14 9V3z",fill:"currentColor",stroke:"none"})
  };
  return h("svg",{width:p.s||16,height:p.s||16,viewBox:"0 0 24 24",fill:"none",stroke:"currentColor",strokeWidth:1.5,strokeLinecap:"round",strokeLinejoin:"round",style:p.st},paths[p.i]||paths.check)
}

function Timer(p){
  var s1=uS(false),on=s1[0],sOn=s1[1];
  var s2=uS(p.sec),lf=s2[0],sLf=s2[1];
  var rf=uR(null);
  uE(function(){
    if(on&&lf>0){rf.current=setTimeout(function(){sLf(lf-1)},1e3);return function(){clearTimeout(rf.current)}}
    if(on&&lf===0){sOn(false);sLf(p.sec);try{navigator.vibrate([200,100,200])}catch(e){}}
  },[on,lf,p.sec]);
  var m=Math.floor(lf/60),s=lf%60,pc=((p.sec-lf)/p.sec)*100;
  if(!on)return h("button",{onClick:function(){sOn(true);sLf(p.sec)},style:{display:"inline-flex",alignItems:"center",gap:8,padding:"6px 12px",border:"1px solid var(--line-2)",borderRadius:100,fontSize:11,letterSpacing:"0.05em",color:"var(--text-2)",fontFamily:"'JetBrains Mono',monospace"}},
    h(Ic,{i:"play",s:9}),p.label);
  return h("div",{style:{display:"flex",alignItems:"center",gap:14,padding:"10px 14px",background:"var(--accent-dim)",border:"1px solid var(--accent-line)",borderRadius:12}},
    h("div",{className:"mono",style:{fontSize:22,fontWeight:500,color:lf<=5?"var(--red)":"var(--accent)",minWidth:54,letterSpacing:"-0.02em"}},m+":"+(s<10?"0":"")+s),
    h("div",{style:{flex:1,height:1,background:"var(--line)",position:"relative",overflow:"hidden"}},
      h("div",{style:{position:"absolute",inset:0,background:lf<=5?"var(--red)":"var(--accent)",width:pc+"%",transition:"width 1s linear"}})),
    h("button",{onClick:function(){sOn(false);sLf(p.sec)},style:{color:"var(--text-3)"}},h(Ic,{i:"x",s:14})))
}

function App(){
  var s0=uS(dbLoad),data=s0[0],setData=s0[1];
  var s1=uS("home"),view=s1[0],setView=s1[1];
  var s2=uS(null),selDay=s2[0],setSelDay=s2[1];
  var s3=uS(0),wCnt=s3[0],setWCnt=s3[1];
  var s4=uS(false),fast=s4[0],setFast=s4[1];
  var s5=uS({}),inp=s5[0],setInp=s5[1];
  var s6=uS(null),toast=s6[0],setToast=s6[1];
  var s7=uS(null),hEx=s7[0],setHEx=s7[1];
  var s8=uS("max"),chartMode=s8[0],setChartMode=s8[1];
  var dRef=uR(data);
  var wi=gWI(),td=gTd(),tk=wi+"-"+td;
  uE(function(){dRef.current=data},[data]);
  uE(function(){setWCnt(data.water&&data.water[tk]||0);setFast(data.fast&&data.fast[tk]||false)},[]);

  function sav(nd){setData(nd);dRef.current=nd;dbSave(nd)}
  function fl(m){setToast(m);setTimeout(function(){setToast(null)},1800)}

  uE(function(){
    if(view==="workout"&&selDay!==null){var day=DAYS[selDay];if(day.type!=="muscu")return;
    var li={};day.ex.forEach(function(ex){for(var s=0;s<ex.sets;s++){var k=wi+"-"+selDay+"-"+ex.id,sv=data.w[k]&&data.w[k][s];li[ex.id+"-"+s+"-w"]=sv?sv.weight||"":"";li[ex.id+"-"+s+"-r"]=sv?sv.reps||"":""}});setInp(li)}
  },[view,selDay]);

  function gv(eid,si,f){return inp[eid+"-"+si+"-"+f]||""}
  function sv2(eid,si,f,v){var n=Object.assign({},inp);n[eid+"-"+si+"-"+f]=v;setInp(n)}
  function aAll(eid,num){var w=gv(eid,0,"w"),r=gv(eid,0,"r");if(!w&&!r)return;var n=Object.assign({},inp);for(var s=1;s<num;s++){n[eid+"-"+s+"-w"]=w;n[eid+"-"+s+"-r"]=r}setInp(n);fl("Appliqué à toutes les séries")}

  function saveWk(di){
    var nw=Object.assign({},dRef.current.w);
    DAYS[di].ex.forEach(function(ex){var k=wi+"-"+di+"-"+ex.id;if(!nw[k])nw[k]={};for(var s=0;s<ex.sets;s++){var w=gv(ex.id,s,"w"),r=gv(ex.id,s,"r");if(w||r)nw[k][s]={weight:w,reps:r}}});
    sav(Object.assign({},dRef.current,{w:nw}));fl("Séance enregistrée")
  }

  function doW(d){var n=Math.max(0,wCnt+d);setWCnt(n);var nd=Object.assign({},dRef.current,{water:Object.assign({},dRef.current.water)});nd.water[tk]=n;sav(nd)}
  function doF(){var nv=!fast;setFast(nv);var nd=Object.assign({},dRef.current,{fast:Object.assign({},dRef.current.fast)});nd.fast[tk]=nv;sav(nd)}
  function gP(di,eid,si){var k="W"+(gWN()-1)+"-"+new Date().getFullYear()+"-"+di+"-"+eid;return data.w[k]&&data.w[k][si]||null}
  function gH(di,eid){var hh=[],n=gWN(),y=new Date().getFullYear();for(var w=0;w<12;w++){var k="W"+(n-w)+"-"+y+"-"+di+"-"+eid,sets=data.w[k];if(sets&&Object.keys(sets).length>0){var sa=Object.entries(sets).map(function(e){return{set:parseInt(e[0])+1,weight:e[1].weight,reps:e[1].reps}}).filter(function(s){return s.weight||s.reps});if(sa.length>0)hh.push({week:n-w,sets:sa,cur:w===0})}}return hh}
  function isD(di){var d=DAYS[di];if(d.type!=="muscu")return false;return d.ex.every(function(ex){for(var s=0;s<ex.sets;s++){var v=data.w[wi+"-"+di+"-"+ex.id]&&data.w[wi+"-"+di+"-"+ex.id][s];if(!v||(!v.weight&&!v.reps))return false}return true})}
  function hD(di){return!!data.w[wi+"-"+di+"-hiit"]}
  function doH(di){var nw=Object.assign({},dRef.current.w);nw[wi+"-"+di+"-hiit"]={done:true};sav(Object.assign({},dRef.current,{w:nw}));fl("HIIT enregistré")}
  function wp(){var c=0;DAYS.forEach(function(d,i){if(d.type==="muscu"&&isD(i))c++;if(d.type==="hiit"&&hD(i))c++});return c}

  var wTgt=td===5?4:td===6?3.5:4.5,wL=wCnt*.25,wPc=Math.min(100,(wL/wTgt)*100);

  function Toast(){return toast?h("div",{style:{position:"fixed",top:60,left:"50%",background:"var(--surface-2)",border:"1px solid var(--line-2)",color:"var(--text)",padding:"10px 20px",borderRadius:100,fontSize:12,letterSpacing:"0.02em",zIndex:999,animation:"fadeToast 1.8s cubic-bezier(0.22,1,0.36,1) forwards",display:"flex",alignItems:"center",gap:8}},
    h("span",{style:{width:4,height:4,borderRadius:"50%",background:"var(--accent)"}}),toast):null}

  // HISTORY — with line chart + toggle
  if(view==="history"&&hEx){
    var hex=hEx.ex,hist=gH(hEx.di,hex.id);
    // hist is newest-first; reverse for chronological chart
    var chrono=hist.slice().reverse();
    // Build datapoints depending on mode
    var pts=chrono.map(function(hh){
      var maxW=Math.max.apply(null,hh.sets.map(function(s){return parseFloat(s.weight)||0}));
      var vol=hh.sets.reduce(function(a,s){return a+(parseFloat(s.weight)||0)*(parseFloat(s.reps)||0)},0);
      return{week:hh.week,cur:hh.cur,max:maxW,vol:vol,sets:hh.sets};
    });
    var vals=pts.map(function(p){return chartMode==="max"?p.max:p.vol});
    var vMax=vals.length?Math.max.apply(null,vals):0;
    var vMin=vals.length?Math.min.apply(null,vals):0;
    var range=vMax-vMin||1;
    var pad=range*0.15;
    var yHi=vMax+pad,yLo=Math.max(0,vMin-pad),ySpan=yHi-yLo||1;
    // SVG dims
    var W=320,H=180,padX=8,padY=16;
    var plotW=W-padX*2,plotH=H-padY*2;
    function xAt(i){return pts.length<=1?W/2:padX+(i/(pts.length-1))*plotW}
    function yAt(v){return padY+plotH-((v-yLo)/ySpan)*plotH}
    var linePath="",areaPath="";
    pts.forEach(function(p,i){
      var v=chartMode==="max"?p.max:p.vol;
      var x=xAt(i),y=yAt(v);
      linePath+=(i===0?"M":"L")+x.toFixed(1)+" "+y.toFixed(1)+" ";
    });
    if(pts.length>0){
      areaPath=linePath+"L"+xAt(pts.length-1).toFixed(1)+" "+(padY+plotH)+" L"+xAt(0).toFixed(1)+" "+(padY+plotH)+" Z";
    }
    var last=pts.length?(chartMode==="max"?pts[pts.length-1].max:pts[pts.length-1].vol):0;
    var first=pts.length?(chartMode==="max"?pts[0].max:pts[0].vol):0;
    var delta=last-first;
    var deltaPct=first>0?Math.round((delta/first)*100):0;

    return h("div",{style:{minHeight:"100vh",background:"var(--bg)",paddingBottom:40}},h(Toast),
      h("div",{style:{padding:"24px 24px 0",position:"sticky",top:0,background:"var(--bg)",zIndex:10}},
        h("button",{onClick:function(){setView("workout");setHEx(null)},style:{color:"var(--text-2)",padding:"4px 4px 4px 0",marginBottom:24}},h(Ic,{i:"back",s:20})),
        h("div",{className:"eyebrow"},"Progression"),
        h("div",{className:"serif",style:{fontSize:32,fontWeight:400,letterSpacing:"-0.03em",lineHeight:1.1,marginTop:6}},hex.name),
        h("div",{style:{fontSize:12,color:"var(--text-3)",marginTop:8,paddingBottom:20}},pts.length+" semaine"+(pts.length>1?"s":"")+" enregistrée"+(pts.length>1?"s":""))),

      pts.length===0?
        h("div",{style:{textAlign:"center",padding:"80px 24px"}},
          h("div",{style:{width:1,height:40,background:"var(--line)",margin:"0 auto 24px"}}),
          h("div",{className:"serif",style:{fontSize:20,fontWeight:300,color:"var(--text-2)",fontStyle:"italic"}},"Aucune donnée"),
          h("div",{style:{fontSize:12,color:"var(--text-3)",marginTop:8}},"Enregistre une séance pour voir ta courbe")):
        h("div",null,
          // Toggle
          h("div",{style:{padding:"0 24px",marginBottom:24}},
            h("div",{style:{display:"flex",gap:4,padding:4,background:"var(--surface)",border:"1px solid var(--line)",borderRadius:12}},
              [["max","Charge max"],["vol","Volume total"]].map(function(m){
                var active=chartMode===m[0];
                return h("button",{key:m[0],onClick:function(){setChartMode(m[0])},style:{flex:1,padding:"10px",borderRadius:9,background:active?"var(--accent-dim)":"transparent",border:active?"1px solid var(--accent-line)":"1px solid transparent",color:active?"var(--accent)":"var(--text-3)",fontSize:12,fontWeight:500,letterSpacing:"0.04em",transition:"all 0.2s"}},m[1])
              }))),

          // Big current value + delta
          h("div",{style:{padding:"0 24px",marginBottom:8}},
            h("div",{style:{display:"flex",alignItems:"baseline",gap:12}},
              h("div",{className:"serif",style:{fontSize:48,fontWeight:300,letterSpacing:"-0.04em",lineHeight:1}},
                chartMode==="max"?last:(last>=1000?(last/1000).toFixed(1)+"k":last),
                h("span",{style:{fontSize:15,color:"var(--text-3)",marginLeft:8,fontStyle:"italic"}},chartMode==="max"?"lbs":"lbs·vol")),
              pts.length>1&&delta!==0?h("div",{style:{fontSize:13,fontFamily:"'JetBrains Mono',monospace",color:delta>0?"var(--green)":"var(--red)",letterSpacing:"0.02em"}},
                (delta>0?"+":"")+(chartMode==="max"?delta:(Math.abs(delta)>=1000?(delta/1000).toFixed(1)+"k":delta))+" ("+(deltaPct>0?"+":"")+deltaPct+"%)"):null),
            h("div",{className:"label",style:{marginTop:6}},chartMode==="max"?"Charge maximale actuelle":"Volume total actuel · charge × reps")),

          // Chart
          h("div",{style:{padding:"24px 16px 8px"}},
            h("svg",{viewBox:"0 0 "+W+" "+H,style:{width:"100%",height:"auto",overflow:"visible"}},
              // gridlines
